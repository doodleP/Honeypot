services:
  mongodb:
    image: mongo:7
    container_name: honeyglow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: honeypot123
    networks:
      - honeyglow-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: honeyglow-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:honeypot123@mongodb:27017/honeyglow?authSource=admin
      JWT_SECRET: super-secret-honeypot-jwt-key-change-in-production
      GEOIP_API_KEY: ${GEOIP_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
    depends_on:
      - mongodb
      - ollama
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: honeyglow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: honeyglow-dashboard
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: honeyglow-admin-panel
    restart: unless-stopped
    ports:
      - "5175:5175"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./admin-panel:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  nginx:
    image: nginx:alpine
    container_name: honeyglow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - dashboard
    networks:
      - honeyglow-network

  zeek:
    image: zeek/zeek:latest
    container_name: honeyglow-zeek
    restart: unless-stopped
    depends_on:
      - nginx
    # Share nginx's network namespace so Zeek can sniff the same interface
    # and observe attacker <-> nginx and nginx <-> backend/frontend traffic.
    network_mode: "service:nginx"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./zeek/logs:/zeek/logs
    working_dir: /zeek/logs
    # Avoid `bash -l` (login shell) which can reset PATH.
    # `ignore_checksums` helps in containerized/offload scenarios.
    command:
      [
        "bash",
        "-c",
        "zeek -C -i eth0 local",
      ]

  ollama:
    image: ollama/ollama:latest
    container_name: honeyglow-ollama
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_NUM_THREAD: 8
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_GPU_MEMORY_FRACTION: 0.9
      OLLAMA_NUM_GPU: 1
      OLLAMA_GPU_LAYERS: 43
      OLLAMA_KEEP_ALIVE: 10m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command:
      - serve
    networks:
      - honeyglow-network

  threat-intel:
    build:
      context: ./threat-intel
      dockerfile: Dockerfile
    container_name: honeyglow-threat-intel
    restart: "no"
    environment:
      MONGODB_URI: mongodb://admin:honeypot123@mongodb:27017/honeyglow?authSource=admin
      MONGODB_DB: honeyglow
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1:8b
    depends_on:
      - mongodb
      - backend
      - zeek
      - ollama
    working_dir: /app/threat-intel
    volumes:
      - ./:/app
    command:
      [
        "sh",
        "-c",
        "until [ -s /app/zeek/logs/conn.log ] && [ -s /app/server/logs/combined.log ] && [ -s /app/attacker-bot/brute_force_log.json ]; do echo 'Waiting for logs...'; sleep 5; done; python run_pipeline.py --model \"$$OLLAMA_MODEL\" --ollama-base-url \"$$OLLAMA_BASE_URL\" --mongo-uri \"$$MONGODB_URI\" --mongo-db \"$$MONGODB_DB\" --zeek-http-log ../zeek/logs/conn.log --app-log ../server/logs/combined.log --session-log ../attacker-bot/brute_force_log.json --output-report ./output/threat_intelligence_report.md",
      ]
    networks:
      - honeyglow-network

volumes:
  mongodb_data:
  mongodb_config:
  ollama_data:

networks:
  honeyglow-network:
    driver: bridge
