version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: honeyglow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: honeypot123
    networks:
      - honeyglow-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: honeyglow-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:honeypot123@mongodb:27017/honeyglow?authSource=admin
      JWT_SECRET: super-secret-honeypot-jwt-key-change-in-production
      GEOIP_API_KEY: ${GEOIP_API_KEY:-}
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: honeyglow-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: honeyglow-dashboard
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    networks:
      - honeyglow-network

  nginx:
    image: nginx:alpine
    container_name: honeyglow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
      - dashboard
    networks:
      - honeyglow-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  honeyglow-network:
    driver: bridge
